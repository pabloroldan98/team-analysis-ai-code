# .github/workflows/fill_players_data.yml
name: Fill Players Data

on:
  workflow_dispatch:

concurrency:
  group: fill-players-data
  cancel-in-progress: false

jobs:
  fill-data:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run fill_players_data
        run: python fill_players_data.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/json/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No files were modified."
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Modified files:"
            git diff --name-only data/json/
          fi

      - name: Configure git
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Commit changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git add data/json/
          git commit -m "Fill missing player data [$(date -u '+%Y-%m-%d')]"

      - name: Push changes
        if: steps.changes.outputs.has_changes == 'true'
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
